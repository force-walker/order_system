name: backend-ci

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/ci.yml'

jobs:
  backend-lint:
    name: backend-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app tests

  backend-schema:
    name: backend-schema
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Validate Alembic heads (single head expected)
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          versions = Path('alembic/versions')
          rev = re.compile(r"^revision\s*=\s*['\"]([^'\"]+)['\"]", re.M)
          down = re.compile(r"^down_revision\s*=\s*['\"]([^'\"]+)['\"]", re.M)

          revisions = set()
          down_revisions = set()

          for f in versions.glob('*.py'):
              text = f.read_text(encoding='utf-8')
              m1 = rev.search(text)
              m2 = down.search(text)
              if m1:
                  revisions.add(m1.group(1))
              if m2:
                  down_revisions.add(m2.group(1))

          heads = sorted(revisions - down_revisions)
          print('heads:', heads)
          if len(heads) != 1:
              raise SystemExit(f'Expected exactly one alembic head, got {len(heads)}: {heads}')
          PY

      - name: Compile check
        run: python -m compileall app tests

      - name: OpenAPI docs/runtime sync check
        run: python scripts/check_openapi_sync.py

      - name: Runbook command consistency check
        run: python scripts/check_runbook_commands.py

  backend-test:
    name: backend-test
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-schema]
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Tests
        run: pytest -q 2>&1 | tee pytest.log

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log
          path: backend/pytest.log
