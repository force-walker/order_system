openapi: 3.0.3
info:
  title: Order System Error Components Draft
  version: 0.2.0
  description: Reusable OpenAPI components aligned to current API runtime error payload.

components:
  schemas:
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Stable application error code.
          enum:
            - AUTH_REQUIRED
            - FORBIDDEN
            - ORDER_NOT_FOUND
            - RESOURCE_NOT_FOUND
            - ORDER_STATUS_MISMATCH
            - VERSION_CONFLICT
            - INVALID_TRANSITION_PAIR
            - STATUS_NO_TARGET_LINES
            - ORDER_WEIGHT_REQUIRED
            - INVOICE_NOT_FOUND
            - INVOICE_NOT_DRAFT
            - INVOICE_NOT_FINALIZED
            - INVOICE_NOT_LOCKED_FINALIZED
            - INVALID_RESET_REASON_CODE
            - INVALID_UNLOCK_REASON_CODE
            - NEGATIVE_INVOICE_TOTAL
            - NO_INVOICEABLE_ITEMS
            - CATCH_WEIGHT_REQUIRED
            - UNIT_PRICE_UOM_COUNT_REQUIRED
            - UNIT_PRICE_UOM_KG_REQUIRED
            - ALLOCATION_NOT_FOUND
            - ALLOCATION_INVALID
            - ALLOCATION_INVALID_TARGET_QTY
            - SPLIT_QTY_MISMATCH
            - SPLIT_GROUP_MISSING_PARENT
            - SPLIT_GROUP_MIN_CHILDREN
            - SPLIT_GROUP_QTY_MISMATCH
            - SPLIT_GROUP_UOM_MISMATCH
        message:
          type: string

  responses:
    BadRequest:
      description: Bad request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            badRequest:
              value:
                code: ORDER_WEIGHT_REQUIRED
                message: per_kg item requires estimated_weight_kg or actual_weight_kg

    Unauthorized:
      description: Unauthorized.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            authRequired:
              value:
                code: AUTH_REQUIRED
                message: missing auth headers

    Forbidden:
      description: Forbidden.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            denied:
              value:
                code: FORBIDDEN
                message: forbidden

    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invoiceNotFound:
              value:
                code: INVOICE_NOT_FOUND
                message: invoice not found

    Conflict:
      description: State conflict.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            noTargetLines:
              value:
                code: STATUS_NO_TARGET_LINES
                message: no eligible lines
            versionConflict:
              value:
                code: VERSION_CONFLICT
                message: record has been updated by another user

    UnprocessableEntity:
      description: Validation error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalidTransition:
              value:
                code: INVALID_TRANSITION_PAIR
                message: invalid transition pair

paths:
  /api/v1/invoices/{invoice_id}/finalize:
    post:
      summary: Finalize invoice (response mapping sample)
      responses:
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
